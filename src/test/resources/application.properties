spring.application.name=SistemaAgendamento-test

# DataSource de teste (H2 em memória)
spring.datasource.url=jdbc:h2:mem:sistema_agendamento_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate para testes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Security / JWT (test)
security.jwt.secret=test-secret-32-characters-minimum
security.jwt.expiration-hours=1
